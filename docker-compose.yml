services:
  nginx:
    container_name: core-finance-nginx
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    restart: always

  backend:
    container_name: core-finance-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/core_finance
      - VALKEY_URL=valkey://valkey:6379
      - INTERNAL_API_KEY=dev-secret-key-123
      - GEMINI_API_KEY=YOUR_GEMINI_API_KEY_HERE
    volumes:
      - core-finance-backend-data:/app/data
    depends_on:
      db:
        condition: service_started
      valkey:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  worker:
    container_name: core-finance-worker
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/core_finance
      - VALKEY_URL=valkey://valkey:6379
      - INTERNAL_API_KEY=dev-secret-key-123
      - GEMINI_API_KEY=YOUR_GEMINI_API_KEY_HERE
      - BACKEND_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_started
      valkey:
        condition: service_started
    restart: always

  valkey:
    container_name: core-finance-valkey
    image: valkey/valkey:alpine
    ports:
      - "6379:6379"
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - core-finance-valkey-data:/data
    restart: always

  frontend:
    container_name: core-finance-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    restart: always

  db:
    container_name: core-finance-db
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=core_finance
    volumes:
      - core-finance-db-data:/var/lib/postgresql/data
    restart: always

volumes:
  core-finance-backend-data:
    name: core-finance-backend-data
  core-finance-db-data:
    name: core-finance-db-data
  core-finance-valkey-data:
    name: core-finance-valkey-data
